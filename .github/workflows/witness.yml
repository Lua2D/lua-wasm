# The witnesses, re-run on every change (AGENTS.md durability: CI-enforced).
#
# native: the deepest witness -- the ltests-instrumented interpreter
#   (checked allocator, internal assertions) runs the full official
#   suite, C-API battery included.
# wasm: the artifact witnesses -- the interpreter passes the official
#   suite on two engines (wasmtime = non-V8 cross-check; Node 24 = V8
#   with stable exnref), and the embeddable reactor passes its
#   host-interface witness plus the stress battery.
# embed: the link-Lua-in consumer shape (#11) -- the source-drop
#   downstream (drives embedded Lua + Lua error across the boundary) and
#   the external-EH witness (typed catches via a real wasm-EH libc++abi).
# browser: the suite-prefix bundle in a real Chromium.
# provenance: the vendored core is verbatim stock 5.4.8 outside the
#   declared files.
#
# Toolchain: zig c++ (pinned 0.15.1 = clang 20.1.2) -- the standardized
# EH encoding needs LLVM 20+, which Ubuntu does not package; zig carries
# its own wasi sysroot. 0.16 (LLVM 21) miscompiles this build (its
# backend rejects the micro-runtime's tag symbols; see src/onelua.c).
name: witness
on:
  push:
    branches: [main]
  pull_request:

jobs:
  native:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y libreadline-dev locales
      - name: pt_BR locale (so the suite's decimal-point tests run, not skip)
        # Best-effort, non-gating: the gate below tolerates the environmental
        # locale skip (upstream does too); this just lets those tests run.
        run: sudo locale-gen pt_BR.UTF-8 pt_BR || true
      - name: build the ltests debug interpreter
        run: make lua-debug
      - name: build the suite's C libraries (unlocks the C-API 'testC' battery)
        # Headers live in src/, so LUA_DIR overrides the stock makefile default.
        run: make -C tests/libs LUA_DIR=../../src
      - name: official suite, full ltests build (C-API battery, zero-skips gate)
        # Full mode (no _port) exercises the tests/libs C modules -- the C-API
        # 'testC' battery port mode cannot reach. Two non-obvious requirements,
        # both witnessed before landing:
        #  * stdin MUST be non-seekable. files.lua's invalid-seek test asserts
        #    io.stdin:seek() fails; that only holds on a pipe -- a redirect or
        #    /dev/null seeks fine (returns 0) and trips the assert. So: ': |'.
        #  * the gate is 'final OK !!!' present AND zero 'testC not active'
        #    skips (the Makefile's stated bar); the locale skip is tolerated.
        run: |
          set -euo pipefail
          cd tests
          : | ../lua-debug all.lua 2>&1 | tee /tmp/suite.log
          grep -q 'final OK !!!' /tmp/suite.log \
            || { echo "::error::suite did not reach 'final OK !!!'"; exit 1; }
          ! grep -q 'testC not active' /tmp/suite.log \
            || { echo "::error::C-API tests skipped (testC not active); tests/libs missing"; exit 1; }

  wasm:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '>=24.15 <25'  # 24.0-24.14 reject stable exnref (need --experimental-wasm-exnref); 24.15 turned it on
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: toolchain (zig c++ = clang 20.1.2; wasmtime)
        run: python3 -m pip install 'ziglang==0.15.1' wasmtime
      - name: build lua.wasm (standardized EH encoding)
        run: >
          make wasm
          WASM_CLANGXX="python3 -m ziglang c++" WASM_SYSROOT=
          WASM_EXTRA="-Xclang -target-feature -Xclang +exception-handling"
      - name: official suite under wasmtime (non-V8 engine)
        run: cd tests && python3 ../scripts/wasmtime-run.py ../lua.wasm -e"_port=true" all.lua
      - name: official suite under Node 24 (V8, stable exnref)
        run: cd tests && node ../scripts/wasm-run.mjs ../lua.wasm -e"_port=true" all.lua
      - name: build the reactor and run the embed witness
        run: >
          make wasm-lib
          WASM_CLANGXX="python3 -m ziglang c++" WASM_SYSROOT=
          WASM_EXTRA="-Xclang -target-feature -Xclang +exception-handling"
          && node scripts/embed-demo.mjs lua-lib.wasm
          && node scripts/reactor-stress.mjs lua-lib.wasm

  embed:
    # The second consumer shape (#11): a downstream that links Lua *into*
    # its own wasm32-wasi artifact via the source-drop path, drives
    # embedded Lua, and catches a Lua error across the boundary.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '>=24.15 <25'  # 24.0-24.14 reject stable exnref (need --experimental-wasm-exnref); 24.15 turned it on
      - name: toolchain (zig c++ = clang 20.1.2)
        run: python3 -m pip install 'ziglang==0.15.1'
      - name: build the embed example (link Lua in) and run its witness
        run: |
          set -o pipefail
          WASM_CXX="python3 -m ziglang c++" WASM_SYSROOT= \
          WASM_EXTRA="-Xclang -target-feature -Xclang +exception-handling" \
            examples/embed/build.sh | tee /tmp/embed.log
          grep -q 'EMBED WITNESS OK' /tmp/embed.log \
            || { echo "::error::embed example did not print EMBED WITNESS OK"; exit 1; }
      - name: external-EH witness (typed catches with a real wasm-EH libc++abi)
        # WASM_EH=external's runtime proof: the micro-shim suppressed, a real
        # libc++abi built with -fwasm-exceptions from zig's bundled LLVM
        # runtime sources, and a downstream catching its own TYPED exception
        # while Lua errors travel the same runtime. See build-eh.sh.
        run: |
          set -o pipefail
          examples/embed/build-eh.sh | tee /tmp/embed-eh.log
          grep -q 'EXTERNAL-EH WITNESS OK' /tmp/embed-eh.log \
            || { echo "::error::external-EH witness did not print EXTERNAL-EH WITNESS OK"; exit 1; }

  browser:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false               # one engine's result must not cancel the others
      matrix:
        engine: [chromium, firefox, webkit]
    # All three browser engines are gating. The suite-prefix bundle (the wasm-EH
    # detonation sequence) runs to SUITE-PREFIX PASS on Chromium (V8), Firefox
    # (SpiderMonkey), and WebKit (JSC family) -- first witnessed 2026-07-22 with
    # Firefox 151 and WebKit 26.5 (#42). The driver refuses to pass unless the
    # page actually ran on the requested engine (three guards).
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '>=24.15 <25'  # 24.0-24.14 reject stable exnref (need --experimental-wasm-exnref); 24.15 turned it on
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: toolchain
        run: python3 -m pip install 'ziglang==0.15.1'
      - name: build lua.wasm
        run: >
          make wasm
          WASM_CLANGXX="python3 -m ziglang c++" WASM_SYSROOT=
          WASM_EXTRA="-Xclang -target-feature -Xclang +exception-handling"
      - name: install ${{ matrix.engine }}
        run: npm i --no-save playwright@1.61.1 && npx playwright install --with-deps ${{ matrix.engine }}
      - name: suite-prefix bundle in a real ${{ matrix.engine }}
        run: >
          python3 scripts/suite-bundle.py
          && node scripts/browser-witness.mjs lua.wasm tests/suite-prefix-bundle.lua --engine ${{ matrix.engine }}

  provenance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: vendored core is verbatim stock 5.4.8 (issue #7)
        # lua.org egress exists on runners but not in every authoring
        # sandbox -- this job is the witness's CI home. The sha256 echo
        # re-states the tarball hash so a pin drift (verify-stock.sh's
        # LUA_SHA256, filled from run 28798839189) is diagnosable from
        # the log.
        run: |
          curl -fsSL -o /tmp/lua.tar.gz https://www.lua.org/ftp/lua-5.4.8.tar.gz
          echo "lua-5.4.8.tar.gz sha256 (for the LUA_SHA256 pin in verify-stock.sh):"
          sha256sum /tmp/lua.tar.gz
          bash scripts/verify-stock.sh
