# Release cut -- fired MANUALLY (workflow_dispatch; issue #19). Builds the
# default artifacts with the pinned toolchain, re-verifies them (encoding
# check + full suite on both engines + reactor witnesses), then tags and
# publishes with the artifacts attached. Green witnesses gate the tag: a
# release cannot be cut from a build that didn't just prove itself.
name: release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "tag to cut, e.g. v0.1.0"
        type: string
        required: true

permissions:
  contents: write  # create the tag + release and attach artifacts
  actions: write   # the final step dispatches deep-witness.yml; the
                   # workflow_dispatch API refuses without this (issue #40)

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '>=24.15 <25'  # 24.0-24.14 reject stable exnref (need --experimental-wasm-exnref); 24.15 turned it on
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python3 -m pip install 'ziglang==0.15.1' wasmtime
      - name: build both artifacts (pinned toolchain, standardized encoding)
        run: |
          make wasm \
            WASM_CLANGXX="python3 -m ziglang c++" WASM_SYSROOT= \
            WASM_EXTRA="-Xclang -target-feature -Xclang +exception-handling"
          make wasm-lib \
            WASM_CLANGXX="python3 -m ziglang c++" WASM_SYSROOT= \
            WASM_EXTRA="-Xclang -target-feature -Xclang +exception-handling"
      - name: verify encoding (wasmtime rejects legacy at compile time)
        run: |
          python3 - <<'EOF'
          from wasmtime import Config, Engine, Module
          cfg = Config(); cfg.wasm_exceptions = True
          eng = Engine(cfg)
          for f in ("lua.wasm", "lua-lib.wasm"):
              Module.from_file(eng, f)
              print(f"{f}: standardized encoding confirmed")
          EOF
      - name: full suite, both engines
        run: |
          (cd tests && python3 ../scripts/wasmtime-run.py ../lua.wasm -e"_port=true" all.lua)
          (cd tests && node ../scripts/wasm-run.mjs ../lua.wasm -e"_port=true" all.lua)
      - name: reactor witnesses
        run: |
          node scripts/embed-demo.mjs lua-lib.wasm
          node scripts/reactor-stress.mjs lua-lib.wasm
      - name: tag and publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.version }}" \
            --target "${{ github.sha }}" \
            --title "lua.wasm ${{ inputs.version }}" \
            --notes "Lua 5.4.8 for wasm32-wasi. Standardized wasm-EH encoding (try_table/exnref); runs on Node >= 24.15 (earlier 24.x needs --experimental-wasm-exnref), current browsers, and wasmtime. lua.wasm = standalone interpreter; lua-lib.wasm = embeddable reactor (luaw_* interface, see README). Built with zig c++ 0.15.1 (clang 20.1.2); witnesses re-run at cut time by this workflow. Evidence state: doc/wasm-audit-2026-07-05.md at this tag." \
            lua.wasm lua-lib.wasm
      - name: fire the release-tier deep witnesses against the tag
        # The tag above is created with GITHUB_TOKEN, whose events do not
        # chain-trigger on.push workflows -- dispatch deep-witness (the
        # plain clang-20 full-suite build) explicitly so every release
        # carries the heavy-tier evidence (issue #3's release tier).
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deep-witness.yml --ref "${{ inputs.version }}" -f job=all
